# Маппінг розділ постачальника → svitsvitla category_id.
# Перевірено 2026-06-07 разом з власником.
#
# svitsvitla категорії (з XML expоrtу):
#   1288 Світлодіодні стрічки
#   1289 Гнучкий неон (+ 1290 Прямокутний, 1291 Круглий)
#   1326 Профіль LED (+ 1327 алюмін. з 1328 аксес., 1329 силікон. з 1330 аксес.)
#   1321 Трекові (+ 1322 Шинопровід, 1323 Світ. треків, 1324 Аксес. треків,
#                  1325 БЖ 48В, 1337 Керування треків)
#   1331 Керування
#   1332 Блоки живлення
#   1333 Аксесуари (+ 1334 Аксес. стрічок, 1335 Неон. розсіювач, 1336 Аксес. неона)
#   ??? Світильники LED — треба створити РУЧНО у svitsvitla, ID підставити сюди
#   ??? Нові з імпорту без маппінгу (fallback)


modernlight:
  # Прайс ML "Раздел" → svitsvitla cat_id
  "LED-профіль":                             1327   # Профіль алюмінієвий
  "Світлодіодні стрічки":                    1288
  "Світлодіодні стрічки/Аксесуари":          1334   # Аксес. підключ. стрічки
  "Керування":                               1331
  "Блоки живлення":                          1332
  "Неон/Аксесуари":                          1336   # Аксес. підключ. неону
  "Неон/Архітектурний":                      1289   # Гнучкий неон
  "Неон/Круглий":                            1291   # Круглий неон
  "Неон/Slim":                               1289
  "Неон/Термостійкий для саун":              1289
  "Неон/Для басейнів":                       1289
  "Трекові системи":                         1321
  "Трекові системи/Світильники":             1323   # Світ. для треків
  "Трекові системи/Аксесуари":               1324   # Аксес. трек.
  "Трекові системи/Блоки живлення 48V":      1325
  "Аксесуари":                               1333
  "Комплектуючі":                            1333

  # Світильники — у svitsvitla створено окрему категорію "Світильники LED",
  # ID треба підставити після створення.
  "Світильники":                             1350   # Світильники LED (створено 2026-06-08)
  "Світильники/SKYLINE":                     1350
  "Світильники/Світильники з неону":         1350
  "Світильники/LED-панелі":                  1350
  "Світильники/Підвісні":                    1350
  "LED-панелі":                              1350


prolum:
  # Prolum categoryId → svitsvitla cat_id
  "1121":  1332    # Джерела живлення
  "1163":  1333    # Аксесуари для підключення → загальні (змішане)
  "1245":  1321    # Трекова система
  "1057":  1288    # Світлодіодна стрічка
  "1063":  1289    # Світлодіодний неон
  "1126":  1331    # Управління
  "1243":  1327    # Профіль → алюм.
  "1241":  1335    # Неоновий розсіювач
  "1127":  1331    # Управління/RGB контролери
  "1128":  1331    # Управління/Підсилювачі
  "1073":  1327    # Профіль/Алюмінієвий
  "1069":  1350    # Світлодіодні модулі → Світильники LED
  "1070":  null    # ?
  "1152":  null    # ?


klus:
  # KLUS — переважно алюмінієвий профіль. Дефолт для всіх KLUS-* sku:
  default: 1327


# Уточнення категорії за назвою: у секції "Трекові системи" (1321) лежать і
# світильники, і компоненти треку. Світильники → 1323 (Світильники для треків),
# компоненти (трек/профіль/з'єднання/підвіс/заглушка) лишаються в 1321.
recategorize:
  - from: 1321
    to: 1323                      # Світильники для треків
    if_name_contains: ["світильник", "спот"]
  - from: 1321
    to: 1322                      # Шинопровід — сама рейка + основа (профіль-база)
    if_name_contains: ["шинопровід", "магнітний трек", "трек накладн", "трековий профіль", "профіль база"]
  - from: 1321
    to: 1324                      # Аксесуари — з'єднання/конектори/підвіси/заглушки
    if_name_contains: ["з'єднанн", "конект", "підвіс", "трос", "заглушк", "вставк", "закінч"]


# Категорії-нові у svitsvitla (створені 2026-06-08):
lights_category_id: 1350     # Світильники LED
fallback_category_id: 1351   # Нові з імпорту без маппінгу
# 1351 прихована (тех.) → нема в експорті svitsvitla, тому додаємо її назву
# вручну у блок <categories> згенерованого new.xml:
fallback_category_name: "Нові з імпорту без маппінгу"


# Виключення — товари, які НЕ потрапляють у фід (маркетинговий мерч, демо,
# тех.позиції). Матч по точному артикулу (exclude_skus) АБО по підрядку в назві
# (exclude_name_patterns, регістр не важливий). Додавай сюди нові в міру виявлення.
exclude_skus:
  - "2779"   # USB-флешка COLORS
  - "2781"   # Фірмова чашка COLORS
  - "2782"   # Брошура COLORS 2025
  - "2783"   # Сумка-шопер COLORS
  - "2784"   # Каталог лінійного освітлення 2025
  - "2785"   # Каталог стрічок/неону 2025
  - "2774"   # Демо-бокс трекового освітлення
  - "2775"   # Демо-бокс трекового освітлення
  - "2776"   # Демо-бокс трекового освітлення
  - "2777"   # Демо-бокс трекового освітлення
  - "2778"   # Демо-бокс трекового освітлення
  - "2780"   # Демо-бокс неону
  - "2787"   # Демо-бокс неону

exclude_name_patterns:
  - "брошур"
  - "сумка-шопер"
  - "usb-флеш"
  - "демонстраційн"   # демо-бокси


# Націнки по бренду (тільки для svitsvitla, не впливає на ARTLED/CRM).
# Застосовується до price після всіх формул постачальників.
# value = скільки додати до price (UAH).
brand_markup:
  Rishang: 10     # +10 грн/м (рішення власника 2026-06-08)
